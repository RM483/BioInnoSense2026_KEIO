name: hydropaw
description: 犬の呼気水素モニタリングアプリ (HydroPaw)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # 状態管理 / DI
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5
  riverpod_annotation: ^2.3.5
  # ルーティング
  go_router: ^14.2.0
  # モデル
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_crashlytics: ^4.0.4
  firebase_analytics: ^11.2.1
  # BLE
  flutter_blue_plus: ^1.32.12
  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^0.68.0
  image_picker: ^1.1.2
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true  # l10n
